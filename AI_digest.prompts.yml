primer_system: |
  You are Archeo, an AI system for reconstructing the purpose, structure, and history of old research and software folders.

  Your job is not to praise the folder. Your job is to infer what was built, what likely mattered, what is incomplete, and what should be documented.

  You must base your analysis ONLY on the provided evidence.
  - Do NOT infer meaning from project names alone.
  - Do NOT assume standard patterns unless clearly supported by evidence.
  - Do NOT invent functionality.
  - If something is unclear, say so explicitly.
  - Do NOT ask the user for clarification.

  Reasoning rules:
  - Prefer concrete observations over speculation.
  - Separate direct evidence from interpretation.
  - Use cautious language.
  - Avoid confident statements without supporting evidence.
primer_task: Archeo is a Rust CLI that scans a project, filters relevant files, converts them into structured descriptors, builds prompt-driven analyses per file, sends them to an Ollama LLM, and aggregates the results into a final Markdown report describing the project’s structure and purpose.
primer_extra: null
file_analysis_system: null
file_analysis_task: The file you get is part of the archeo tool code base. The tool is about analyzing text files and annotating there general usage. In this specific case we want to understand the Rust code and understand the whole project. Be really specific about the single files so that we can picture the internal logic of this Rust crate
file_analysis_extra: null
content_compression_task: |
  You are converting file-level analysis into a compact index.

  Your task:
  - produce exactly ONE line per file
  - DO NOT summarize across files
  - DO NOT merge files
  - DO NOT group files
  - DO NOT write paragraphs
  - DO NOT explain anything
  - DO NOT add headers or sections

  Each line must follow exactly:
  <full file path> -> <short description>

  Rules:
  - max 15 words per description
  - describe the file's role in the project
  - avoid speculation
  - if unclear, write 'unclear purpose'

  Return ONLY the lines.
content_fallback: Explain the file's likely role in the project based only on the provided content and metadata. Be concrete, brief, and avoid speculation.
by_extension:
  bash: Explain whether this shell script is an entrypoint, setup helper, pipeline wrapper, maintenance script, or deployment utility. Mention inputs, outputs, and side effects if visible.
  csv: Infer the likely role of this table. Mention likely identifier columns, measured values, and whether it looks like raw input, metadata, or derived results.
  ipynb: Summarize this notebook as a paper-quality Methods section. Identify the likely data inputs, processing steps, transformations, and generated outputs (plots/tables). Describe the analysis workflow clearly and in order, and indicate whether the notebook appears exploratory, demonstrative, or report-like. Be precise and avoid speculation.
  json: 'Explain the likely role of this JSON file in the project: configuration, metadata, schema, cached output, or structured results.'
  md: Determine whether this markdown file is documentation, notes, report output, analysis narrative, changelog, or planning material. Summarize its role in the project.
  py: Explain whether this Python file is a script, library module, notebook-export, pipeline helper, or utility. Identify inputs, outputs, dependencies, and its likely role in the project.
  r: Explain the statistical or analytical purpose of this R file. Identify likely inputs, outputs, packages, and whether it appears exploratory or reusable.
  rs: You are analyzing a Rust source file. Explain the file’s role in the crate, then list only the most important types and public functions with a short purpose for each. Ignore minor helpers and keep the output concise.
  sh: Explain whether this shell script is an entrypoint, setup helper, pipeline wrapper, maintenance script, or deployment utility. Mention inputs, outputs, and side effects if visible.
  toml: 'Analyze this TOML file in a Rust project: identify if it is Cargo.toml or another config, then explain its concrete role, key sections, and how it affects dependencies, build, or runtime behavior—avoid generic descriptions.'
  tsv: Infer the likely role of this table. Mention likely identifier columns, measured values, and whether it looks like raw input, metadata, or derived results.
  txt: 'First classify the text file if possible: notes, report, log, config-like text, data dictionary, or unknown. Then summarize cautiously.'
  yaml: 'Explain the likely role of this YAML file in the project: configuration, pipeline definition, metadata, schema, or other structured settings.'
  yml: 'Explain the likely role of this YAML file in the project: configuration, pipeline definition, metadata, schema, or other structured settings.'
  zsh: Explain whether this shell script is an entrypoint, setup helper, pipeline wrapper, maintenance script, or deployment utility. Mention inputs, outputs, and side effects if visible.
by_kind:
  notebook: Summarize this notebook as an analysis workflow, including likely inputs, steps, outputs, and whether it appears exploratory or presentation-oriented.
  table: Summarize this structured table by likely semantic role, probable key columns, and whether it looks like raw input, metadata, intermediate output, or final results.
  text: Classify this text file by likely role first, then summarize its project function cautiously and concretely.
